<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride None
        Require all granted

        RewriteEngine On

        # Si la ruta pedida es un archivo o carpeta real (assets/, admin/, imagen.php, etc.),
        # se sirve tal cual — así ningún archivo real se confunde con el slug de una copa.
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]

        # /slug/  ->  index.php?copa=slug
        RewriteRule ^([a-z0-9-]+)/?$ index.php?copa=$1 [QSA,L]
        # /slug/archivo.php  ->  archivo.php?copa=slug
        RewriteRule ^([a-z0-9-]+)/(.+)$ $2?copa=$1 [QSA,L]
    </Directory>
</VirtualHost>
